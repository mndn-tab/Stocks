<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Input Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

            button:hover {
                background-color: #0056b3;
            }

        .output {
            margin-top: 15px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Enter Details</h2>
        <form id="dataForm">
            <label for="symbol">Symbol</label>
            <input type="text" id="symbol" name="symbol" required>

            <label for="startDate">Start Date</label>
            <input type="text" id="startDate" name="startDate" placeholder="YYYY-MM-DD" required>

            <label for="endDate">End Date</label>
            <input type="text" id="endDate" name="endDate" placeholder="YYYY-MM-DD" required>

            <button type="submit">Submit</button>
        </form>

        <div class="output" id="output"></div>
    </div>

    <script>
    document.getElementById("dataForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const symbol = document.getElementById("symbol").value;
        const startDate = document.getElementById("startDate").value;
        const endDate = document.getElementById("endDate").value;

        document.getElementById("output").innerHTML = `
            <strong>Submitted Values:</strong><br>
            Symbol: ${symbol}<br>
            Start Date: ${startDate}<br>
            End Date: ${endDate}
        `;
    });
    </script>

</body>
</html>
